{% extends 'layout.html' %}
{% block content %}
<section class="grid-2x2">
    <div class="card graph-card full-width">
        <div class="card-header"><h2>Packet Activity</h2></div>
        <div id="chart-packet-activity" class="graph-box"></div>
    </div>

    <div class="card graph-card">
        <div class="card-header"><h2>Detected Classes</h2></div>
        <div id="chart-bar" class="graph-box"></div>
    </div>

    <div class="card graph-card">
        <div class="card-header"><h2>Total Packets - Last 24 Hours</h2></div>
        <div id="chart-24h" class="graph-box"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/visualizations.js') }}"></script>
{% endblock %}
