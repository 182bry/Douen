{% extends 'layout.html' %}
{% block content %}
<section class="connection-layout">
    <div class="card">
        <div class="card-header"><h2>Connection and Runtime Settings</h2></div>
        <form id="settings-form" class="settings-form">
            <label>Host URL
                <input type="text" name="host_url" id="host-url-display" readonly>
            </label>
            <label>Sender URL
                <input type="text" name="sender_target" id="sender-target-display" readonly>
            </label>
            <label>Poll seconds
                <input type="number" step="0.5" name="poll_seconds" placeholder="3">
            </label>
            <label>LLM base URL
                <input type="text" name="llm_base_url" placeholder="https://synapse.sergiomathurin.com/v1">
            </label>
            <label>LLM model
                <input type="text" name="llm_model" placeholder="llama3.3-70b-instruct">
            </label>
            <label>LLM API key
                <input type="password" name="llm_api_key" placeholder="Paste API key here">
            </label>
            <label>Binary Classification Model
                <select name="binary_model_name" id="binary-model-select"></select>
            </label>
            <label>Anomaly Detection Model
                <select name="anomaly_model_name" id="anomaly-model-select"></select>
            </label>
            <div class="button-row full-width-row">
                <button type="submit" class="btn btn-primary">Save Settings</button>
                <button type="button" id="btn-test-llm" class="btn">Test LLM</button>
            </div>
        </form>
        <textarea id="llm-test-output" class="text-output" readonly>LLM test output will show here.</textarea>
    </div>

    <div class="card">
        <div class="card-header"><h2>Stream Controls</h2></div>
        <div class="button-row bottom-space">
            <label class="checkbox-row">
                <input type="checkbox" id="simulator-mode-toggle" checked>
                <span>Use Simulator Mode</span>
            </label>
            <button id="btn-start-stream" class="btn btn-primary">Start Stream</button>
            <button id="btn-stop-stream" class="btn btn-danger">Stop Stream</button>
        </div>
        <textarea id="model-metrics-output" class="text-output" readonly>Model details will show here.</textarea>
        <div id="stream-status" class="status-box">Stream status unknown.</div>
    </div>

    <div class="card">
        <div class="card-header"><h2>Current Server Status</h2></div>
        <div id="server-status" class="status-grid"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/connection.js') }}"></script>
{% endblock %}
