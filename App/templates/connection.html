{% extends 'layout.html' %}
{% block content %}
<section class="connection-layout">
    <div class="card">
        <div class="card-header"><h2>Settings and Runtime Settings</h2></div>
        <form id="settings-form" class="settings-form">
            <label>Host URL
                <input type="text" name="host_url" id="host-url-display" readonly>
            </label>
            <label>Sender URL
                <input type="text" name="sender_target" id="sender-target-display" readonly>
            </label>
            <label>Poll seconds
                <input type="number" step="0.5" name="poll_seconds" placeholder="3">
            </label>
            <label>Correlation window minutes
                <input type="number" step="1" name="correlation_window_minutes" placeholder="5">
            </label>
            <label>Detection API URL
                <input type="text" name="security_api_url" placeholder="http://127.0.0.1:5001">
            </label>
            <label>Detection API key
                <input type="password" name="security_api_key" placeholder="Optional API key">
            </label>
            <label>LLM base URL
                <input type="text" name="llm_base_url" placeholder="https://synapse.sergiomathurin.com/v1">
            </label>
            <label>LLM model
                <input type="text" name="llm_model" placeholder="llama3.3-70b-instruct">
            </label>
            <label>LLM API key
                <input type="password" name="llm_api_key" placeholder="Paste API key here">
            </label>
            <div class="button-row full-width-row">
                <button type="submit" class="btn btn-primary">Save Settings</button>
                <button type="button" id="btn-test-llm" class="btn">Test LLM</button>
            </div>
        </form>
        <textarea id="llm-test-output" class="text-output" readonly>LLM test output will show here.</textarea>
    </div>

    <div class="card">
        <div class="card-header"><h2>Current Server Status</h2></div>
        <div id="server-status" class="status-grid"></div>
        <textarea id="pipeline-status-output" class="text-output" readonly>Detection pipeline status will show here.</textarea>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/connection.js') }}"></script>
{% endblock %}
